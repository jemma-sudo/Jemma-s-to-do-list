<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jemma's to-do list</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f6f5f1;--bg3:#f0ede8;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d98;
  --border:rgba(0,0,0,0.12);--borderh:rgba(0,0,0,0.28);
  --rad:8px;--radl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#2a2a27;--bg3:#232321;
  --text:#f0ede8;--text2:#a09f9a;--text3:#6b6a65;
  --border:rgba(255,255,255,0.12);--borderh:rgba(255,255,255,0.28);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:24px 20px 60px}

.header-row{display:grid;grid-template-columns:110px 1fr;gap:6px;margin-bottom:18px;align-items:center}
h1{font-size:26px;font-weight:600;color:var(--text);white-space:nowrap}
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:14px}
.legend{display:flex;flex-wrap:wrap;gap:8px 12px;justify-content:flex-end}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:7px;height:7px;border-radius:50%}
.undo-btn{font-size:12px;padding:4px 10px;height:28px;border-radius:var(--rad);border:0.5px solid var(--borderh);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;opacity:.5;transition:opacity .15s}
.undo-btn:not(:disabled):hover{opacity:1;background:var(--bg2)}
.undo-btn:disabled{opacity:.25;cursor:default}
.flash{font-size:12px;color:#1D9E75;opacity:0;transition:opacity .3s;white-space:nowrap}
.flash.show{opacity:1}

.grid{display:grid;grid-template-columns:110px repeat(3,minmax(0,1fr));gap:6px;margin-bottom:8px}
.col-head{font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;text-align:center;padding:6px 4px 10px;color:var(--text)}
.row-head{font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:flex-start;justify-content:flex-end;padding:9px 8px 0 0;text-align:right;line-height:1.2;color:var(--text)}
.rh-done{color:#1D9E75}
.rh-done-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:2px}

.cell{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radl);padding:7px;min-height:90px;display:flex;flex-direction:column;gap:4px;position:relative}
.cell.drag-over{outline:2px dashed var(--borderh)}
.done-cell{background:#f0faf5;border-color:rgba(29,158,117,0.3)}
@media(prefers-color-scheme:dark){.done-cell{background:#0d2820}}
.done-clear-row{display:flex;justify-content:flex-end;flex-shrink:0;order:-1}
.clear-cell-btn{font-size:10px;font-weight:500;padding:2px 7px;height:20px;border-radius:6px;border:0.5px solid rgba(29,158,117,0.35);background:rgba(29,158,117,0.07);color:#1D9E75;cursor:pointer;font-family:inherit;line-height:1}
.clear-cell-btn:hover{background:rgba(29,158,117,0.18)}
.clear-all-btn{font-size:10px;font-weight:500;padding:3px 7px;height:22px;border-radius:6px;border:0.5px solid rgba(29,158,117,0.4);background:rgba(29,158,117,0.08);color:#1D9E75;cursor:pointer;font-family:inherit;line-height:1}
.clear-all-btn:hover{background:rgba(29,158,117,0.18)}

.day-note-row{display:grid;grid-template-columns:110px repeat(3,minmax(0,1fr));gap:6px;margin-bottom:14px}
.day-note{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radl);overflow:hidden}
.day-note textarea{width:100%;font-size:12px;font-family:inherit;color:var(--text2);background:transparent;border:none;outline:none;resize:none;padding:7px 9px;line-height:1.5;height:56px}
.day-note textarea::placeholder{color:var(--text3)}

.task{font-size:12px;line-height:1.35;padding:5px 7px 5px 9px;border-radius:var(--rad);cursor:grab;display:flex;flex-direction:column;gap:4px;border-left:2.5px solid transparent;user-select:none;position:relative}
.task:active{cursor:grabbing}
.task.dragging{opacity:.3}
.task.editing-mode{cursor:default;outline:2px solid #534AB7;outline-offset:1px}
.task-main{display:flex;align-items:flex-start;gap:6px;width:100%}
.task-check{width:13px;height:13px;flex-shrink:0;margin-top:1px;cursor:pointer;accent-color:#1D9E75;opacity:.4;transition:opacity .15s}
.task:hover .task-check,.task-check:checked{opacity:.9}
.task-text{flex:1;word-break:break-word}
.task-hover-actions{display:flex;gap:1px;opacity:0;flex-shrink:0}
.task:not(.editing-mode):hover .task-hover-actions{opacity:1}
.task-btn{font-size:13px;line-height:1;cursor:pointer;color:var(--text3);padding:0 3px;background:none;border:none;border-radius:4px;font-family:inherit}
.task-btn:hover{background:rgba(0,0,0,0.08);color:var(--text)}

.task-edit-overlay{display:none;flex-direction:column;gap:7px;margin-top:2px}
.task.editing-mode .task-edit-overlay{display:flex}
.task.editing-mode .task-hover-actions{display:none}
.task-edit-input{font-size:12px;font-family:inherit;color:var(--text);background:var(--bg);border:0.5px solid var(--borderh);border-radius:6px;padding:5px 8px;outline:none;width:100%}
.task-edit-input:focus{border-color:#534AB7}
.dot-row{display:flex;gap:7px;align-items:center}
.color-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-dot:hover{transform:scale(1.15)}
.color-dot.sel{border-color:var(--text)}
.dup-btn{font-size:11px;padding:3px 9px;height:24px;border-radius:6px;border:0.5px solid var(--borderh);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;margin-left:auto}
.dup-btn:hover{background:var(--bg2);color:var(--text)}

.g-urgent  {border-left-color:#E24B4A;background:#FCEBEB;color:#791F1F}
.g-admin   {border-left-color:#EF9F27;background:#FAEEDA;color:#633806}
.g-videos  {border-left-color:#378ADD;background:#E6F1FB;color:#0C447C}
.g-creators{border-left-color:#534AB7;background:#EEEDFE;color:#3C3489}
.g-other-g {border-left-color:#888780;background:#F1EFE8;color:#444441}
.g-done    {border-left-color:#1D9E75;background:#E1F5EE;color:#085041}
@media(prefers-color-scheme:dark){
  .g-urgent  {background:#3d1515;color:#F09595}
  .g-admin   {background:#2e2106;color:#FAC775}
  .g-videos  {background:#0d1e30;color:#85B7EB}
  .g-creators{background:#1e1c40;color:#AFA9EC}
  .g-other-g {background:#222220;color:#B4B2A9}
  .g-done    {background:#0d2820;color:#5DCAA5}
}

.bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;align-items:start}
.notes-panel{margin-bottom:14px}
.panel{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radl);padding:10px 12px;display:flex;flex-direction:column}
.add-bar-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.add-bar-row input[type=text]{flex:1;font-size:13px;padding:6px 10px;height:34px;border-radius:var(--rad);border:0.5px solid var(--borderh);background:var(--bg2);color:var(--text);outline:none;font-family:inherit}
.group-btns{display:flex;gap:5px;flex-wrap:wrap}
.group-btn{font-size:12px;height:30px;padding:0 12px;border-radius:var(--rad);border:1.5px solid transparent;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s,transform .1s;opacity:.45}
.group-btn.selected{opacity:1;transform:scale(1.05)}
.gb-urgent  {background:#FCEBEB;color:#791F1F;border-color:#E24B4A}
.gb-admin   {background:#FAEEDA;color:#633806;border-color:#EF9F27}
.gb-videos  {background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.gb-creators{background:#EEEDFE;color:#3C3489;border-color:#534AB7}
.gb-other-g {background:#F1EFE8;color:#444441;border-color:#888780}
.btn-add{background:#534AB7;color:#fff;border:1.5px solid #534AB7;font-weight:500;height:34px;padding:0 14px;font-size:13px;border-radius:var(--rad);cursor:pointer;font-family:inherit}
.btn-add:hover{background:#3C3489;border-color:#3C3489;color:#fff}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px}
.drop-list{display:flex;flex-direction:column;gap:4px;min-height:50px}
.list-empty{font-size:12px;color:var(--text3);font-style:italic;padding:4px 2px}
.nw-divider{border:none;border-top:0.5px solid var(--border);margin:10px 0 8px}
textarea.notes{width:100%;min-height:140px;font-size:13px;font-family:inherit;color:var(--text);background:transparent;border:none;outline:none;resize:vertical;line-height:1.6}
textarea.notes::placeholder{color:var(--text3)}
</style>
</head>
<body>

<div class="header-row">
  <div><h1>Jemma's to-do list</h1></div>
  <div class="header-right">
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#E24B4A"></div>Urgent</div>
      <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>Admin</div>
      <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>Videos</div>
      <div class="leg"><div class="leg-dot" style="background:#534AB7"></div>Creators</div>
      <div class="leg"><div class="leg-dot" style="background:#888780"></div>Other</div>
      <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Done</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="undo-btn" id="undo-btn" disabled>↩ Undo</button>
      <span class="flash" id="flash">Saved</span>
    </div>
  </div>
</div>

<div class="grid">
  <div></div>
  <div class="col-head">Monday</div>
  <div class="col-head">Thursday</div>
  <div class="col-head">Friday</div>

  <div class="row-head">Do today</div>
  <div class="cell" data-day="mon" data-pri="today"></div>
  <div class="cell" data-day="thu" data-pri="today"></div>
  <div class="cell" data-day="fri" data-pri="today"></div>

  <div class="row-head">Do now</div>
  <div class="cell" data-day="mon" data-pri="now"></div>
  <div class="cell" data-day="thu" data-pri="now"></div>
  <div class="cell" data-day="fri" data-pri="now"></div>

  <div class="row-head">Do later</div>
  <div class="cell" data-day="mon" data-pri="later"></div>
  <div class="cell" data-day="thu" data-pri="later"></div>
  <div class="cell" data-day="fri" data-pri="later"></div>

  <div class="row-head rh-done">
    <div class="rh-done-wrap">
      <span>Done</span>
      <button class="clear-all-btn" id="clear-all-done">Clear all</button>
    </div>
  </div>
  <div class="cell done-cell" data-day="mon" data-pri="done">
    <div class="done-clear-row"><button class="clear-cell-btn" data-clear="mon">Clear</button></div>
  </div>
  <div class="cell done-cell" data-day="thu" data-pri="done">
    <div class="done-clear-row"><button class="clear-cell-btn" data-clear="thu">Clear</button></div>
  </div>
  <div class="cell done-cell" data-day="fri" data-pri="done">
    <div class="done-clear-row"><button class="clear-cell-btn" data-clear="fri">Clear</button></div>
  </div>
</div>

<div class="day-note-row">
  <div></div>
  <div class="day-note"><textarea placeholder="Monday notes..." id="note-mon"></textarea></div>
  <div class="day-note"><textarea placeholder="Thursday notes..." id="note-thu"></textarea></div>
  <div class="day-note"><textarea placeholder="Friday notes..." id="note-fri"></textarea></div>
</div>

<div class="bottom">
  <div class="panel">
    <div class="add-bar-row">
      <input type="text" id="new-task" placeholder="Type a task..." />
      <button class="btn-add" id="add-btn">+ Add</button>
    </div>
    <div class="group-btns" id="group-btns">
      <button class="group-btn gb-urgent selected" data-group="g-urgent">Urgent</button>
      <button class="group-btn gb-admin"    data-group="g-admin">Admin</button>
      <button class="group-btn gb-videos"   data-group="g-videos">Videos</button>
      <button class="group-btn gb-creators" data-group="g-creators">Creators</button>
      <button class="group-btn gb-other-g"  data-group="g-other-g">Other</button>
    </div>
  </div>
  <div class="panel">
    <div class="section-label">Next week</div>
    <div class="drop-list" id="inbox" data-day="inbox" data-pri="inbox">
      <span class="list-empty" id="inbox-empty">No tasks yet</span>
    </div>
  </div>
</div>

<div class="panel notes-panel">
  <div class="section-label">Notes</div>
  <textarea class="notes" id="notes" placeholder="Anything else..."></textarea>
</div>

<script>
const DEFAULT_TASKS=[
  {text:'Meta comments & DMs',group:'g-urgent',day:'mon',pri:'today'},
  {text:'Clear email inbox',group:'g-admin',day:'mon',pri:'today'},
  {text:'Clear CV Slack',group:'g-admin',day:'mon',pri:'today'},
  {text:'Ethix – monday tidy up',group:'g-admin',day:'mon',pri:'now'},
  {text:'Add things to monday + content for next week',group:'g-admin',day:'mon',pri:'now'},
  {text:'Content Library (naming)',group:'g-other-g',day:'mon',pri:'later'},
  {text:'Where we started > where we are going doc',group:'g-other-g',day:'mon',pri:'later'},
  {text:'Content brief (step by step guide)',group:'g-other-g',day:'mon',pri:'later'},
  {text:'Annual leave 17th July (Clem – 1hr)',group:'g-other-g',day:'mon',pri:'later'},
  {text:'TikTok video',group:'g-urgent',day:'thu',pri:'today'},
  {text:'FILM – scripts/videos for next week',group:'g-videos',day:'thu',pri:'now'},
  {text:'Hooks/lines for studio filming',group:'g-videos',day:'thu',pri:'now'},
  {text:'Emily & Gez intro video',group:'g-videos',day:'thu',pri:'now'},
  {text:'Emily lived experience edit',group:'g-videos',day:'thu',pri:'later'},
  {text:'Edit podcast hooks + promo video',group:'g-videos',day:'thu',pri:'later'},
  {text:'Pacing team video',group:'g-videos',day:'thu',pri:'later'},
  {text:'Meta comments & DMs',group:'g-urgent',day:'fri',pri:'today'},
  {text:'TikTok upload / core creators refresh',group:'g-creators',day:'fri',pri:'now'},
  {text:'Reminder for old creators',group:'g-creators',day:'fri',pri:'now'},
  {text:'2 key takeaways from workshop',group:'g-other-g',day:'fri',pri:'later'},
  {text:'Jemma – lived experience',group:'g-creators',day:'fri',pri:'later'},
  {text:'Oonagh – Oxford paper',group:'g-other-g',day:'fri',pri:'later'},
];

const GROUPS=[
  {id:'g-urgent',  color:'#E24B4A'},
  {id:'g-admin',   color:'#EF9F27'},
  {id:'g-videos',  color:'#378ADD'},
  {id:'g-creators',color:'#534AB7'},
  {id:'g-other-g', color:'#888780'},
];
const ALL_G=['g-urgent','g-admin','g-videos','g-creators','g-other-g','g-done'];
const SK='jemma_matrix_v10';
let dragEl=null, selectedGroup='g-urgent', saveTimer=null, undoStack=[];

function val(id){return document.getElementById(id).value;}
function snapshot(){return {tasks:readState(),notes:val('notes'),noteM:val('note-mon'),noteTh:val('note-thu'),noteF:val('note-fri')};}
function pushUndo(){undoStack.push(snapshot());if(undoStack.length>40)undoStack.shift();document.getElementById('undo-btn').disabled=false;}

function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(SK,JSON.stringify(snapshot()));
      const f=document.getElementById('flash');
      f.classList.add('show');setTimeout(()=>f.classList.remove('show'),1200);
    }catch(e){}
  },400);
}

function updateEmpty(){
  const c=document.getElementById('inbox');
  const e=document.getElementById('inbox-empty');
  if(e) e.style.display=c.querySelectorAll('.task').length===0?'block':'none';
}

function closeAllEdits(){
  document.querySelectorAll('.task.editing-mode').forEach(t=>{
    const input=t.querySelector('.task-edit-input');
    if(input){const v=input.value.trim();if(v){t.dataset.text=v;t.querySelector('.task-text').textContent=v;}}
    t.classList.remove('editing-mode');
    t.draggable=true;
  });
  autoSave();
}

function getInsertIndex(cell,y){
  const tasks=[...cell.querySelectorAll(':scope > .task')];
  for(let i=0;i<tasks.length;i++){const r=tasks[i].getBoundingClientRect();if(y<r.top+r.height/2)return i;}
  return tasks.length;
}
function insertAt(cell,el,idx){
  const tasks=[...cell.querySelectorAll(':scope > .task')];
  if(idx>=tasks.length)cell.appendChild(el);else cell.insertBefore(el,tasks[idx]);
}
function findContainer(day,pri){
  if(day==='inbox')return document.getElementById('inbox');
  return document.querySelector(`.cell[data-day="${day}"][data-pri="${pri}"]`);
}

function moveToDone(div){
  const cell=div.closest('.cell,.drop-list');
  if(cell && cell.dataset.pri!=='done'){
    div.dataset.originDay=cell.dataset.day;
    div.dataset.originPri=cell.dataset.pri;
  }
  const day=['mon','thu','fri'].includes(cell&&cell.dataset.day)?cell.dataset.day:(div.dataset.originDay||'mon');
  const target=document.querySelector(`.cell[data-day="${day}"][data-pri="done"]`);
  if(!target) return;
  pushUndo();
  ALL_G.forEach(c=>div.classList.remove(c));
  div.classList.add('g-done');
  const chk=div.querySelector('.task-check'); if(chk)chk.checked=true;
  target.appendChild(div);
  updateEmpty();autoSave();
}

function moveBackFromDone(div){
  pushUndo();
  let target=null;
  const od=div.dataset.originDay, op=div.dataset.originPri;
  if(od && op && op!=='done') target=findContainer(od,op);
  if(!target){
    const cur=div.closest('.cell');
    const d=cur&&['mon','thu','fri'].includes(cur.dataset.day)?cur.dataset.day:'mon';
    target=document.querySelector(`.cell[data-day="${d}"][data-pri="later"]`);
  }
  ALL_G.forEach(c=>div.classList.remove(c));
  div.classList.add(div.dataset.group);
  const chk=div.querySelector('.task-check'); if(chk)chk.checked=false;
  target.appendChild(div);
  updateEmpty();autoSave();
}

function makeTask(t){
  const inDone=t.pri==='done';
  const div=document.createElement('div');
  div.className='task '+(inDone?'g-done':t.group);
  div.draggable=true;
  div.dataset.group=t.group;
  div.dataset.text=t.text;
  if(t.originDay) div.dataset.originDay=t.originDay;
  if(t.originPri) div.dataset.originPri=t.originPri;

  const main=document.createElement('div');
  main.className='task-main';

  const check=document.createElement('input');
  check.type='checkbox';check.className='task-check';check.title='Mark done';
  if(inDone)check.checked=true;
  check.addEventListener('click',e=>e.stopPropagation());
  check.addEventListener('change',()=>{
    const nowInDone=(div.closest('.cell')||{}).dataset?(div.closest('.cell')||{dataset:{}}).dataset.pri==='done':false;
    const parent=div.closest('.cell');
    const isDoneCell=parent&&parent.dataset.pri==='done';
    if(check.checked && !isDoneCell) moveToDone(div);
    else if(!check.checked && isDoneCell) moveBackFromDone(div);
  });

  const textSpan=document.createElement('span');
  textSpan.className='task-text';textSpan.textContent=t.text;

  const hover=document.createElement('span');
  hover.className='task-hover-actions';
  const pencil=document.createElement('button');pencil.className='task-btn';pencil.title='Edit';pencil.textContent='✎';
  const del=document.createElement('button');del.className='task-btn';del.title='Delete';del.textContent='×';
  hover.appendChild(pencil);hover.appendChild(del);

  main.appendChild(check);main.appendChild(textSpan);main.appendChild(hover);

  const overlay=document.createElement('div');overlay.className='task-edit-overlay';
  const input=document.createElement('input');input.type='text';input.className='task-edit-input';
  const dotRow=document.createElement('div');dotRow.className='dot-row';
  GROUPS.forEach(g=>{
    const dot=document.createElement('div');
    dot.className='color-dot'+(g.id===t.group?' sel':'');
    dot.style.background=g.color;dot.dataset.g=g.id;
    dot.addEventListener('click',e=>{
      e.stopPropagation();
      const pc=div.closest('.cell,.drop-list');
      const inD=pc&&pc.dataset.pri==='done';
      ALL_G.forEach(c=>div.classList.remove(c));
      div.classList.add(inD?'g-done':g.id);
      div.dataset.group=g.id;
      dotRow.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('sel'));
      dot.classList.add('sel');
      autoSave();
    });
    dotRow.appendChild(dot);
  });
  const dup=document.createElement('button');dup.className='dup-btn';dup.textContent='Duplicate';
  dup.addEventListener('click',e=>{
    e.stopPropagation();pushUndo();
    document.getElementById('inbox').appendChild(makeTask({text:div.dataset.text,group:div.dataset.group,day:'inbox',pri:'inbox'}));
    updateEmpty();closeAllEdits();
  });
  dotRow.appendChild(dup);
  overlay.appendChild(input);overlay.appendChild(dotRow);

  div.appendChild(main);div.appendChild(overlay);

  pencil.addEventListener('click',e=>{
    e.stopPropagation();
    const already=div.classList.contains('editing-mode');
    closeAllEdits();
    if(!already){div.classList.add('editing-mode');div.draggable=false;input.value=div.dataset.text;input.focus();input.select();}
  });
  input.addEventListener('keydown',e2=>{if(e2.key==='Enter'||e2.key==='Escape')closeAllEdits();e2.stopPropagation();});

  del.addEventListener('click',e=>{e.stopPropagation();pushUndo();div.remove();updateEmpty();autoSave();});

  div.addEventListener('dragstart',e=>{
    if(div.classList.contains('editing-mode')){e.preventDefault();return;}
    closeAllEdits();dragEl=div;setTimeout(()=>div.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';
  });
  div.addEventListener('dragend',()=>{div.classList.remove('dragging');dragEl=null;updateEmpty();autoSave();});

  return div;
}

function wire(cell){
  cell.addEventListener('dragover',e=>{e.preventDefault();cell.classList.add('drag-over');});
  cell.addEventListener('dragleave',e=>{if(!cell.contains(e.relatedTarget))cell.classList.remove('drag-over');});
  cell.addEventListener('drop',e=>{
    e.preventDefault();cell.classList.remove('drag-over');
    if(!dragEl)return;
    pushUndo();
    const inDone=cell.dataset.pri==='done';
    const fromCell=dragEl.closest('.cell,.drop-list');
    if(inDone && fromCell && fromCell.dataset.pri!=='done'){
      dragEl.dataset.originDay=fromCell.dataset.day;
      dragEl.dataset.originPri=fromCell.dataset.pri;
    }
    ALL_G.forEach(c=>dragEl.classList.remove(c));
    dragEl.classList.add(inDone?'g-done':dragEl.dataset.group);
    const chk=dragEl.querySelector('.task-check');if(chk)chk.checked=inDone;
    insertAt(cell,dragEl,getInsertIndex(cell,e.clientY));
    updateEmpty();autoSave();
  });
}

function loadTasks(tasks){
  document.querySelectorAll('.cell,.drop-list').forEach(c=>Array.from(c.querySelectorAll('.task')).forEach(t=>t.remove()));
  tasks.forEach(t=>{
    const sel=t.day==='inbox'?document.getElementById('inbox'):document.querySelector(`.cell[data-day="${t.day}"][data-pri="${t.pri}"]`);
    if(sel)sel.appendChild(makeTask(t));
  });
  updateEmpty();
}

function readState(){
  const tasks=[];
  [...document.querySelectorAll('.cell'),document.getElementById('inbox')].forEach(c=>{
    if(!c)return;
    c.querySelectorAll(':scope > .task').forEach(el=>{
      tasks.push({text:el.dataset.text,group:el.dataset.group,day:c.dataset.day,pri:c.dataset.pri,originDay:el.dataset.originDay,originPri:el.dataset.originPri});
    });
  });
  return tasks;
}

function restoreState(s){
  loadTasks(s.tasks||[]);
  document.getElementById('notes').value=s.notes||'';
  document.getElementById('note-mon').value=s.noteM||'';
  document.getElementById('note-thu').value=s.noteTh||'';
  document.getElementById('note-fri').value=s.noteF||'';
}

function init(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){restoreState(JSON.parse(raw));if(!readState().length)loadTasks(DEFAULT_TASKS);}
    else loadTasks(DEFAULT_TASKS);
  }catch(e){loadTasks(DEFAULT_TASKS);}
}

document.querySelectorAll('.cell').forEach(wire);
wire(document.getElementById('inbox'));

document.getElementById('undo-btn').addEventListener('click',()=>{
  if(!undoStack.length)return;
  restoreState(undoStack.pop());autoSave();
  if(!undoStack.length)document.getElementById('undo-btn').disabled=true;
});

document.getElementById('clear-all-done').addEventListener('click',()=>{
  if(confirm('Clear all done tasks?')){
    pushUndo();
    ['mon','thu','fri'].forEach(d=>{const c=document.querySelector(`.cell[data-day="${d}"][data-pri="done"]`);if(c)c.querySelectorAll('.task').forEach(t=>t.remove());});
    autoSave();
  }
});
document.querySelectorAll('.clear-cell-btn').forEach(b=>{
  b.addEventListener('click',e=>{
    e.stopPropagation();pushUndo();
    const c=document.querySelector(`.cell[data-day="${b.dataset.clear}"][data-pri="done"]`);
    if(c)c.querySelectorAll('.task').forEach(t=>t.remove());
    autoSave();
  });
});

document.getElementById('group-btns').addEventListener('click',e=>{
  const btn=e.target.closest('.group-btn');if(!btn)return;
  document.querySelectorAll('.group-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');selectedGroup=btn.dataset.group;
});

document.getElementById('add-btn').addEventListener('click',()=>{
  const text=document.getElementById('new-task').value.trim();if(!text)return;
  pushUndo();
  document.getElementById('inbox').appendChild(makeTask({text,group:selectedGroup,day:'inbox',pri:'inbox'}));
  document.getElementById('new-task').value='';document.getElementById('new-task').focus();
  updateEmpty();autoSave();
});
document.getElementById('new-task').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-btn').click();});

['notes','note-mon','note-thu','note-fri'].forEach(id=>document.getElementById(id).addEventListener('input',autoSave));

document.addEventListener('click',e=>{if(!e.target.closest('.task'))closeAllEdits();});

init();
</script>
</body>
</html>
